<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Meenu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
height:100vh;
color:white;
}

.screen{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.active{
display:flex;
}

h1{
font-size:3rem;
margin-bottom:20px;
}

h2{
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#ff4d6d;
cursor:pointer;
font-weight:bold;
position:relative;
z-index:999;
}

#countdown{
font-size:1.5rem;
margin:20px 0;
}

.heart{
position:absolute;
font-size:24px;
animation:float 8s linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

#bigCount{
font-size:8rem;
font-weight:bold;
}

#messageBox{
max-width:800px;
background:rgba(255,255,255,.2);
padding:20px;
border-radius:20px;
font-size:1.2rem;
line-height:1.8;
backdrop-filter:blur(5px);
}

.gallery{
width:300px;
height:400px;
border-radius:20px;
overflow:hidden;
background:white;
display:flex;
justify-content:center;
align-items:center;
color:#ff4d6d;
font-size:20px;
}

.gallery img{
width:100%;
height:100%;
object-fit:cover;
}

.nextBtn{
margin-top:20px;
}

.typeCursor{
border-right:3px solid white;
animation:blink .6s infinite;
}

@keyframes blink{
50%{
border-color:transparent;
}
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

<div id="screen1" class="screen active">

<h1>💖 Meenu's Birthday Surprise 💖</h1>

<div id="countdown"></div>

<button onclick="startSurprise()">
Open Surprise ❤️
</button>

</div>

<div id="screen2" class="screen">
<div id="bigCount">3</div>
</div>

<div id="screen3" class="screen">

<h1>🎂 Happy Birthday Meenu 🎂</h1>

<h2>❤️ From Pankaj ❤️</h2>

<button onclick="openLetter()">
Read My Letter ❤️
</button>

</div>

<div id="screen4" class="screen">

<h1>💌 Dear Meenu ❤️</h1>

<div id="messageBox">
<span id="typedText"></span>
<span class="typeCursor"></span>
</div>

<button class="nextBtn" onclick="openGallery()">
Our Memories 📸
</button>

</div>

<div id="screen5" class="screen">

<h1>📸 Our Memories ❤️</h1>

<div class="gallery">
<img id="galleryImg" src="" alt="">
</div>

<button class="nextBtn" onclick="finalPage()">
Final Surprise ❤️
</button>

</div>

<div id="screen6" class="screen">

<h1>❤️ I LOVE YOU FOREVER ❤️</h1>

<h2>Happy Birthday Meenu 🎂</h2>

<h2>Love, Pankaj ❤️</h2>

<div style="font-size:60px">
🎂 ❤️ 🎈 🧸 🌹 ❤️ 🎆
</div>

</div>

<script>

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=
(Math.random()*5+5)+"s";

document.body.appendChild(heart);

}

function showScreen(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

function startSurprise(){

document.getElementById("bgMusic")
.play()
.catch(()=>{});

showScreen("screen2");

let n=3;

let interval=setInterval(()=>{

n--;

document.getElementById("bigCount")
.innerText=n;

if(n===0){

clearInterval(interval);

setTimeout(()=>{

showScreen("screen3");

},1000);

}

},1000);

}

function openLetter(){

showScreen("screen4");

typeMessage();

}

const message=`
WRITE YOUR MESSAGE HERE

Dear Meenu,

Yahan apna emotional birthday message likhna.

Love,
Pankaj ❤️
`;

let index=0;

function typeMessage(){

const target=
document.getElementById("typedText");

target.innerHTML="";

index=0;

let typing=setInterval(()=>{

target.innerHTML+=message.charAt(index);

index++;

if(index>=message.length){

clearInterval(typing);

}

},35);

}

let photos=[
"images/photo1.jpeg",
"images/photo2.jpeg",
"images/photo3.jpeg",
"images/photo4.jpeg",
"images/photo5.jpeg"
];

let photoIndex=0;
let slider;

function openGallery(){

showScreen("screen5");

const img=
document.getElementById("galleryImg");

img.src=photos[0];

slider=setInterval(()=>{

photoIndex++;

if(photoIndex>=photos.length){
photoIndex=0;
}

img.src=photos[photoIndex];

},3000);

}

function finalPage(){

clearInterval(slider);

showScreen("screen6");

}

function updateCountdown(){

const targetDate=
new Date("June 17, 2026 00:00:00");

const now=new Date();

const diff=
targetDate-now;

const days=
Math.floor(diff/(1000*60*60*24));

const hours=
Math.floor(
(diff%(1000*60*60*24))
/
(1000*60*60)
);

const minutes=
Math.floor(
(diff%(1000*60*60))
/
(1000*60)
);

const seconds=
Math.floor(
(diff%(1000*60))
/
1000
);

document.getElementById("countdown")
.innerHTML=
`
⏳ ${days} Days
<br>
${hours} Hours :
${minutes} Minutes :
${seconds} Seconds
`;

}

setInterval(updateCountdown,1000);

updateCountdown();

</script>

</body>
</html>
