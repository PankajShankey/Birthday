 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎂 Happy Birthday Meenu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

#screen4{
overflow-y:auto;
justify-content:flex-start;
align-items:center;
padding-top:40px;
padding-bottom:120px;
height:100vh;
}
  
body{
background:linear-gradient(135deg,#f8d7da,#fff0f5,#fff8f0);
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;
color:white;
position:relative;
}

.screen{
display:none;
width:100%;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
position:relative;
z-index:2;
}

.active{
display:flex;
}

h1{
font-size:3rem;
margin-bottom:20px;
color:#ffffff;
text-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#ff4d6d;
cursor:pointer;
font-weight:bold;
position:relative;
z-index:999;
transition:0.3s;
}

button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

#countdown{
font-size:1.5rem;
margin:20px 0;
}

.heart{
position:fixed;
font-size:24px;
animation:float 8s linear infinite;
pointer-events:none;
z-index:-1;
}

@keyframes float{
0%{
transform:translateY(110vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-20vh);
opacity:0;
}
}

#bigCount{
font-size:8rem;
font-weight:bold;
}

#messageBox{
max-width:800px;
width:95%;
max-height:60vh;
overflow-y:auto;
background:rgba(255,255,255,.35);
padding:20px;
border-radius:20px;
font-size:1.2rem;
line-height:1.8;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.4);
box-shadow:0 8px 25px rgba(0,0,0,.08);
margin-bottom:30px;
white-space: pre-wrap;
word-wrap: break-word;
color:#d6336c;
font-weight:600;
}

.gallery{
width:300px;
height:400px;
border-radius:20px;
overflow:hidden;
background:white;
display:flex;
justify-content:center;
align-items:center;
color:#ff4d6d;
font-size:20px;
border:4px solid white;
box-shadow:0 0 25px rgba(255,255,255,.4);
}

.gallery img{
width:100%;
height:100%;
object-fit:cover;
}

.nextBtn{
position:sticky;
bottom:20px;
margin-top:20px;
z-index:1000;
}

.typeCursor{
border-right:3px solid white;
animation:blink .6s infinite;
}

@keyframes blink{
50%{
border-color:transparent;
}
}
  @media(max-width:768px){

h1{
font-size:2rem;
}

h2{
font-size:1.2rem;
}

#messageBox{
font-size:1rem;
line-height:1.6;
}

button{
font-size:16px;
padding:12px 25px;
}

}
</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="music/song.mp3" type="audio/mpeg">
</audio>

<div id="screen1" class="screen active">

<h1>💖 Meenu's Birthday Surprise 💖</h1>

<div id="countdown"></div>

<button onclick="startSurprise()">
Open Surprise ❤️
</button>

</div>

<div id="screen2" class="screen">
<div id="bigCount">3</div>
</div>

<div id="screen3" class="screen">

<h1>🎂 Happy Birthday Meenu 🎂</h1>

<h2>🌹 A Small Birthday Surprise From Pankaj 🌹</h2>

<button onclick="openLetter()">
Read My Letter ❤️
</button>

</div>

<div id="screen4" class="screen">

<h1>💌 Dear Meenu ❤️</h1>

<div id="messageBox">
<span id="typedText"></span>
<span class="typeCursor"></span>
</div>

<button id="memoryBtn"
class="nextBtn"
onclick="openGallery()"
style="display:none;">
Our Memories 📸
</button>

</div>

<div id="screen5" class="screen">

<h1>📸 Our Memories ❤️</h1>

<div class="gallery">
<img id="galleryImg" src="" alt="">
</div>

<button class="nextBtn" onclick="finalPage()">
Final Surprise ❤️
</button>

</div>

<div id="screen6" class="screen">

<h1>🎂 Happy Birthday Meenu 🎂</h1>

<h2>🌹 Thank You For Being In My Life 🌹</h2>

<h2>✨ Stay Happy, Healthy & Keep Smiling ✨</h2>

<h2>❤️ Forever Yours, Pankaj ❤️</h2>

<div style="font-size:55px;">
🎂 🌹 🍫 🎁 ✨ 🧸 🌸
</div>

</div>

<script>

const items = [
"🌹",
"🎂",
"🍫",
"🎁",
"✨",
"🌸",
"🧸",
"❤️"
];

for(let i=0;i<12;i++){

let heart=document.createElement("div");

heart.innerHTML =
items[Math.floor(Math.random()*items.length)];

heart.className="heart";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=
(Math.random()*5+6)+"s";

heart.style.fontSize=
(Math.random()*20+28)+"px";
heart.style.opacity="0.75";
document.body.appendChild(heart);

}

function showScreen(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

function startSurprise(){

document.getElementById("bgMusic")
.play()
.catch(()=>{});

showScreen("screen2");

let n=3;

let interval=setInterval(()=>{

n--;

document.getElementById("bigCount")
.innerText=n;

if(n===0){

clearInterval(interval);

setTimeout(()=>{

showScreen("screen3");

},1000);

}

},1000);

}

function openLetter(){

showScreen("screen4");

typeMessage();

}

const message=`
Dear Meenu,

🎂❤️ Wish You a Very Happy Birthday, Meenu ❤️🎂

It's been a long time that we have spent together. We have seen a lot of things in our life. Sometimes we talk continuously for hours, and sometimes we have to wait just for a 5-minute conversation. Sometimes we smile 😊, sometimes we share our feelings 💕, and sometimes we get emotional 😢.

But through all these moments, I always feel blessed to have a life partner like you ❤️. Whenever I talk to you, I feel comfortable and happy. Your single message can bring so much happiness to my day and put a smile on my face 😊💖.

You have always supported me, stood by my side, and believed in me. For that, I am truly grateful ❤️. I don't want anything from you except one thing... always keep smiling, my love 😊💕.

I wish that you get everything you want in your life 🌹. May all your dreams come true ✨. May you always stay healthy, happy, and surrounded by love ❤️🎁.

Just be happy, stay healthy, and keep that beautiful smile on your face forever 😊❤️.

🎂 Happy Birthday Once Again, My Love ❤️

Forever Yours,
❤️ Pankaj ❤️
`;

let index=0;
let typing;

function typeMessage(){

const target =
document.getElementById("typedText");
document.getElementById("memoryBtn").style.display = "none";
  
target.innerHTML = "";

index = 0;

clearInterval(typing);

typing = setInterval(()=>{

target.innerHTML += message.charAt(index);

index++;

if(index >= message.length){

clearInterval(typing);

document.getElementById("memoryBtn")
.style.display = "block";

}

},35);

}

let photos=[
"images/photo1.jpeg",
"images/photo2.jpeg",
"images/photo3.jpeg",
"images/photo4.jpeg",
"images/photo5.jpeg"
];

let photoIndex=0;
let slider;

function openGallery(){

showScreen("screen5");

const img=
document.getElementById("galleryImg");

img.src=photos[0];

slider=setInterval(()=>{

photoIndex++;

if(photoIndex>=photos.length){
photoIndex=0;
}

img.src=photos[photoIndex];

},3000);

}

function finalPage(){

clearInterval(slider);

showScreen("screen6");

}

function updateCountdown(){

const targetDate=
new Date("June 17, 2026 00:00:00");

const now=new Date();

const diff=
targetDate-now;

const days=
Math.floor(diff/(1000*60*60*24));

const hours=
Math.floor(
(diff%(1000*60*60*24))
/
(1000*60*60)
);

const minutes=
Math.floor(
(diff%(1000*60*60))
/
(1000*60)
);

const seconds=
Math.floor(
(diff%(1000*60))
/
1000
);

document.getElementById("countdown")
.innerHTML=
`
⏳ ${days} Days
<br>
${hours} Hours :
${minutes} Minutes :
${seconds} Seconds
`;

}

setInterval(updateCountdown,1000);

updateCountdown();
</script>

</body>
</html>
