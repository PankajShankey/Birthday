<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Meenu ❤️</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

h1{
    font-size:3rem;
    margin:20px;
}

#count{
    font-size:5rem;
    font-weight:bold;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4d6d;
    font-size:1.2rem;
    cursor:pointer;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-100px);
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="count">1</div>

<h1 id="wish" style="display:none;">
🎂 Happy Birthday Meenu 🎂
<br><br>
❤️ From Pankaj ❤️
</h1>

<button id="btn" style="display:none;">
Open Surprise ❤️
</button>

<script>

let n=1;

const timer=setInterval(()=>{
    n++;

    if(n<=3){
        document.getElementById("count").innerText=n;
    }

    if(n>3){
        clearInterval(timer);

        document.getElementById("count").style.display="none";

        document.getElementById("wish").style.display="block";

        document.getElementById("btn").style.display="block";
    }

},1000);


for(let i=0;i<30;i++){

    let heart=document.createElement("div");

    heart.innerHTML="❤️";

    heart.className="heart";

    heart.style.left=Math.random()*100+"%";

    heart.style.animationDuration=
    (Math.random()*5+5)+"s";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
